    <text x="423" y="35" fill="#b8b9d0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Battery</text>
    <rect x="0" y="62" width="154" height="5" rx="2.5" fill="url(#accent)"/>
  </g>

  <g transform="translate(358 274)">
