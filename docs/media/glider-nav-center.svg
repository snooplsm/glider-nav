    <text x="24" y="38" fill="#b8b9d0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">BATTERY</text>
    <text x="24" y="102" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="900">78</text>
    <text x="106" y="101" fill="#40e29a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">%</text>
  </g>
  <g transform="translate(358 430)">
    <rect width="226" height="132" rx="24" fill="#ffffff" opacity="0.10" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="24" y="38" fill="#b8b9d0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">MOTOR</text>
    <text x="24" y="102" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900">109</text>
    <text x="136" y="101" fill="#40e29a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">F</text>
  </g>
  <g transform="translate(616 430)">
    <rect width="226" height="132" rx="24" fill="#ffffff" opacity="0.10" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="24" y="38" fill="#b8b9d0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">CONTROLLER</text>
    <text x="24" y="102" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900">101</text>
    <text x="136" y="101" fill="#40e29a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">F</text>
