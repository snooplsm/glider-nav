<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">GliderNav center panel screenshot</title>
  <desc id="desc">A dark mobile dashboard with three tabs, cards, and green to pink accent gradients.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39d67d"/>
      <stop offset="1" stop-color="#ff2f8f"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111228"/>
      <stop offset="1" stop-color="#181936"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="#080914"/>
  <g>
    <rect x="308" y="44" width="584" height="672" rx="42" fill="url(#screen)" stroke="#31324d" stroke-width="2"/>
    <rect x="330" y="66" width="540" height="628" rx="30" fill="#111228"/>
  </g>
  <text x="392" y="130" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Controls</text>
  <text x="600" y="132" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" text-anchor="middle">GliderNav</text>
  <text x="808" y="130" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="end">Ride</text>

  <g transform="translate(350 174)">
