    <text x="24" y="102" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="900">42</text>
    <text x="106" y="101" fill="#40e29a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">mph</text>
  </g>
  <g transform="translate(616 274)">
